<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Purp Pops Cake Pops</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#fff5f8;
}

header{
    background:#d63384;
    color:white;
    text-align:center;
    padding:30px;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.product{
    background:white;
    width:250px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    text-align:center;
}

button{
    background:#d63384;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.order{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
}
</style>
</head>
<body>

<header>
    <h1>Purp Pops Cake Pops</h1>
    <p>Fresh • Handmade • Delicious</p>
</header>

<section class="products">

<div class="product">
    <h2>Chocolate Cake Pop</h2>
    <p>$3 Each</p>
    <button onclick="alert('Fill out order form below')">
        Order
    </button>
</div>

<div class="product">
    <h2>Vanilla Cake Pop</h2>
    <p>$3 Each</p>
    <button onclick="alert('Fill out order form below')">
        Order
    </button>
</div>

<div class="product">
    <h2>Birthday Cake Pop</h2>
    <p>$4 Each</p>
    <button onclick="alert('Fill out order form below')">
        Order
    </button>
</div>

</section>

<section class="order">
<h2>Place Your Order</h2>

<form>
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<input type="tel" placeholder="Phone Number">
<textarea placeholder="Order Details"></textarea>

<button type="submit">Submit Order</button>
</form>

</section>

</body>
</html>
